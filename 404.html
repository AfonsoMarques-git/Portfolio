<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio - Page Not Found</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" href="./images/logos/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/header.css">
    <link rel="stylesheet" href="./css/footer.css">
    <link rel="stylesheet" href="./css/404.css">
</head>

<body style="opacity: 0;">
    <header></header>

    <hr>

    <div class="error-page">
        <h1 class="error-code">404</h1>
        <p class="error-message">Page not found</p>
        <a class="error-link" href="./#home">Go back home</a>
    </div>

    <footer></footer>

    <script src="./js/loaders/header-loader.js"></script>
    <script src="./js/loaders/footer-loader.js"></script>
    <script>
        Promise.all([
            loadHeader(),
            loadFooter()
        ]).then(() => {
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '1';
        });
    </script>
</body>

</html>
