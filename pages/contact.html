<script>
    (() => {
        const isDirectPage = /\/pages\/[^/]+\.html$/i.test(location.pathname);
        if (!isDirectPage) return;

        const page = location.pathname.split('/').pop().replace('.html', '');
        location.replace(`../#${encodeURIComponent(page)}`);
    })();
</script>
