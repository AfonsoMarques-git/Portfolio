<script>
    (() => {
        const isDirectPage = /\/pages\/single-project\.html$/i.test(location.pathname);
        if (!isDirectPage) return;

        const params = new URLSearchParams(location.search);
        const id = params.get('id');

        if (id) {
            location.replace(`../#single-project/${encodeURIComponent(id)}`);
        } else {
            location.replace(`../#single-project`);
        }
    })();
</script>
